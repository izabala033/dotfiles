
###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Screenshot a region
bind = , Print, exec, hyprshot -m region

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, Q, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, Space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, F, exec, brave

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspace pairs with mainMod + [0-9]
# 1-9 map to (1/11) ... (9/19), and 0 maps to (10/20).
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/dual-workspace.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/dual-workspace.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/dual-workspace.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/dual-workspace.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/dual-workspace.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/dual-workspace.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/dual-workspace.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/dual-workspace.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/dual-workspace.sh 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/dual-workspace.sh 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/dual-workspace.sh move 1
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/dual-workspace.sh move 2
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/dual-workspace.sh move 3
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/dual-workspace.sh move 4
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/dual-workspace.sh move 5
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/dual-workspace.sh move 6
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/dual-workspace.sh move 7
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/dual-workspace.sh move 8
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/dual-workspace.sh move 9
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/dual-workspace.sh move 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
